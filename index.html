<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="/assets/github-logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
   <style>
    *{
        font-family: "Geist", sans-serif;
    }
   </style>
</head>
<body class="bg-gray-100 p-20 ">
    <section>
       <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-full max-w-md border p-6 mx-auto">
            <img class="mx-auto" src="/assets/github-logo.png" alt="GitHub Logo">
            <h2 class="text-center font-semibold text-2xl">GitHub Issues Tracker</h2>
            <p class="text-center text-[#64748B] ">Sign in to manage your issues</p>
            
            <label class="label font-medium text-base text-black">Username</label>
            <input id="username" type="text" class="input w-full" placeholder="Enter Username" />
            <p class="text-[#4A00FF] mb-2">Default: admin</p>
            
            <label  class="label font-medium text-base text-black ">Password</label>
            <input id="password" type="password" class="input w-full" placeholder="Enter Password" />

            <p class="text-[#4A00FF] mb-2">Default: admin123</p>

            <button onclick="login()" class="btn btn-primary mt-4">Login</button>
            <div class="flex items-center my-4">
            <hr class="flex-grow border-t border-gray-300">
            <span class="mx-3 text-gray-400 font-semibold">OR</span>
            <hr class="flex-grow border-t border-gray-300">

            </div>
            <div class="text-center bg-gray-100">
                <p class="mb-5">Demo Credentials:</p>
                <p><span class="font-semibold ">Username:</span>admin</p>
                <p><span class="font-semibold ">Password:</span>admin123</p>
            </div>
        </fieldset>
    </section>
    <script src="login.js"></script>
</body>
</html>
